<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Short Video</title>

<style>

body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:sans-serif;
}

.container{
    height:100vh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
}

.page{
    height:100vh;
    scroll-snap-align:start;
    position:relative;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}

.overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    background:rgba(0,0,0,0.3);
    cursor:pointer;
    font-size:18px;
}

.actions{
    position:absolute;
    right:10px;
    bottom:120px;
    color:white;
    font-size:22px;
}

form{
    position:fixed;
    top:10px;
    left:10px;
    z-index:9999;
    background:white;
    padding:10px;
    border-radius:10px;
}

</style>
</head>

<body>

<!-- 上傳 -->
<form action="/api/upload" method="post" enctype="multipart/form-data">
    <input type="file" name="video">
    <button>上傳</button>
</form>

<!-- 影片容器 -->
<div class="container" id="container"></div>

<script>

/* ===== 讀影片 ===== */
fetch("/api/videos")
.then(r => r.json())
.then(data => {

    const container = document.getElementById("container");

    data.forEach(v => {

        const div = document.createElement("div");
        div.className = "page";

        div.innerHTML = `
            <video class="vid" muted autoplay loop playsinline>
                <source src="${v.url}">
            </video>

            <div class="overlay">點一下開聲音</div>

            <div class="actions">
                ❤️ ${v.likes}
                <br>
                ID ${v.id}
            </div>
        `;

        container.appendChild(div);

    });

    /* ===== 點擊開聲音 ===== */
    const videos = document.querySelectorAll(".vid");
    const overlays = document.querySelectorAll(".overlay");

    overlays.forEach((ov, i) => {

        ov.addEventListener("click", () => {

            videos[i].muted = false;
            videos[i].play();

            ov.style.display = "none";

        });

    });

});

</script>

</body>
</html>
