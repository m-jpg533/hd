
<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>HD Shorts</title>

<style>

body{

    margin:0;
    background:black;
    font-family:sans-serif;
    overflow:hidden;

}

.container{

    height:100vh;

    overflow-y:scroll;

    scroll-snap-type:y mandatory;

}

.page{

    height:100vh;

    position:relative;

    scroll-snap-align:start;

}

video{

    width:100%;

    height:100%;

    object-fit:cover;

    background:black;

}

.actions{

    position:absolute;

    right:15px;

    bottom:130px;

    color:white;

    font-size:22px;

    z-index:10;

}

.likeBtn{

    cursor:pointer;

    font-size:30px;

}

.uploadBox{

    position:fixed;

    top:10px;

    left:10px;

    z-index:9999;

    background:rgba(0,0,0,0.7);

    padding:10px;

    border-radius:10px;

}

button{

    padding:10px 15px;

    border:none;

    border-radius:8px;

    cursor:pointer;

}

</style>

</head>

<body>

<div class="uploadBox">

<form id="uploadForm">

<input
type="file"
name="video"
accept="video/mp4,video/webm,video/quicktime">

<button type="submit">

上傳影片

</button>

</form>

</div>

<div
class="container"
id="container">
</div>

<script>

async function loadVideos(){

    const r = await fetch("/api/videos")

    const data = await r.json()

    const container =
    document.getElementById("container")

    container.innerHTML = ""

    data.forEach(v=>{

        const div =
        document.createElement("div")

        div.className = "page"

        div.innerHTML = `

        <video
        src="${v.url}"
        autoplay
        muted
        loop
        playsinline
        controls>
        </video>

        <div class="actions">

            <div
            class="likeBtn"
            onclick="likeVideo(${v.id})">

            ❤️

            </div>

            <div id="like-${v.id}">

            ${v.likes}

            </div>

        </div>

        `

        container.appendChild(div)

    })

}

loadVideos()

// ======================
// 上傳
// ======================

document
.getElementById("uploadForm")
.addEventListener("submit",

async e=>{

    e.preventDefault()

    const formData = new FormData(e.target)

    try{

        const r = await fetch(

            "/api/upload",

            {

                method:"POST",

                body:formData

            }

        )

        const text = await r.text()

        console.log(text)

        const data = JSON.parse(text)

        if(data.ok){

            alert("上傳成功")

            loadVideos()

        }else{

            alert(data.error)

        }

    }catch(err){

        console.log(err)

        alert("上傳失敗")

    }

})

// ======================
// 按讚
// ======================

async function likeVideo(id){

    const r =
    await fetch("/api/like/"+id)

    const data =
    await r.json()

    document.getElementById(
        "like-"+id
    ).innerHTML = data.likes

}

</script>

</body>
</html>
